services:
  passwordmanager:
    build: .
    image: spyminer/passwordvault
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      DB_PATH: /data/passwords.db
    volumes:
      - passwords_data:/data

volumes:
  passwords_data:
